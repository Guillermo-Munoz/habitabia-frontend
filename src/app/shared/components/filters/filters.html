<div class="filters">
  <select class="filters__select" (change)="onCityChange($event)">
    <option value="">Todas las ciudades</option>
    @for (city of citiesList(); track city) {
      <option [value]="city">{{ city }}</option>
    } @empty {
      <option value="">Sin ciudades disponibles</option>
    }
  </select>

  <select class="filters__select" (change)="onGuestsChange($event)">
    <option value="">Todos los huéspedes</option>
    <option value="1">1 huésped</option>
    <option value="2">2 huéspedes</option>
    <option value="3">3 huéspedes</option>
    <option value="4">4 huéspedes</option>
    <option value="5">5 huéspedes</option>
    <option value="6">6 huéspedes</option>
    <option value="7">7+ huéspedes</option>
  </select>
</div>
