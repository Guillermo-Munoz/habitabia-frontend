@if (modal.state()) {
  <div class="modal-backdrop" (click)="modal.state()!.resolve(false)">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <p class="modal-box__message">{{ modal.state()!.message }}</p>
      <div class="modal-box__actions">
        @if (modal.state()!.type === 'confirm') {
          <button class="modal-box__btn modal-box__btn--cancel"
                  (click)="modal.state()!.resolve(false)">
            {{ modal.state()!.cancelLabel }}
          </button>
        }
        <button class="modal-box__btn modal-box__btn--confirm"
                (click)="modal.state()!.resolve(true)">
          {{ modal.state()!.confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
