<div class="login-container">

  <div class="login-card">

    <div class="login-hero">
      <h1 class="login-hero__title">Habitia</h1>
      <p class="login-hero__subtitle">Encuentra tu hogar lejos de casa</p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="login-field">
        <label class="login-field__label" for="email">Email</label>
        <input class="login-field__input" id="email" formControlName="email" type="email" placeholder="tu@email.com" />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <span class="login-field__error">Introduce un email válido</span>
        }
      </div>

      <div class="login-field">
        <label class="login-field__label" for="password">Contraseña</label>
        <input class="login-field__input" id="password" formControlName="password" type="password" placeholder="••••••••" />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="login-field__error">La contraseña es obligatoria</span>
        }
      </div>

      <button class="login-btn" type="submit" [disabled]="loginForm.invalid">Entrar</button>

    </form>

  </div>

</div>
