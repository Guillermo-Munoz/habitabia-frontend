<div class="auth-container">

  <div class="auth-card">

    <div class="auth-hero">
      <h1 class="auth-hero__title">Habitia</h1>
      <p class="auth-hero__subtitle">Encuentra tu hogar lejos de casa</p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="auth-field">
        <label class="auth-field__label" for="email">Email</label>
        <input class="auth-field__input" id="email" formControlName="email" type="email" placeholder="tu@email.com" />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <span class="auth-field__error">Introduce un email válido</span>
        }
      </div>

      <div class="auth-field">
        <label class="auth-field__label" for="password">Contraseña</label>
        <input class="auth-field__input" id="password" formControlName="password" type="password" placeholder="••••••••" />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="auth-field__error">La contraseña es obligatoria</span>
        }
      </div>

      <button class="auth-btn" type="submit" [disabled]="loginForm.invalid">Entrar</button>
      <button class="auth-btn--secondary" type="button" routerLink="/register">¿No tienes cuenta? Regístrate</button>

    </form>

  </div>

</div>
